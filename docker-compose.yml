services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cristal
      POSTGRES_USER: cristal
      POSTGRES_PASSWORD: cristal_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cristal -d cristal"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Containerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql+asyncpg://cristal:cristal_dev@db:5432/cristal
      VERTEX_PROJECT_ID: ${VERTEX_PROJECT_ID}
      VERTEX_LOCATION: ${VERTEX_LOCATION:-us-central1}
      VERTEX_MODEL: ${VERTEX_MODEL:-gemini-2.0-flash-lite-001}
      GOOGLE_APPLICATION_CREDENTIALS: /app/credentials.json
      ALLOWED_ORIGINS: "http://localhost:8080"
      ENVIRONMENT: development
    volumes:
      - ${GOOGLE_APPLICATION_CREDENTIALS:-./credentials.json}:/app/credentials.json:ro
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
