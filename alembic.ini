# Alembic configuration — Cristal 2.0
# Docs: https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Localização dos scripts de migração
script_location = migrations

# Adiciona raiz do projeto ao sys.path para importar app.config.settings
prepend_sys_path = .
path_separator = os

# URL do banco — deixada em branco aqui; env.py lê de app.config.settings
# Para sobrescrever via CLI: alembic -x db=postgresql://...
sqlalchemy.url =

# Opções de geração de SQL (para modo offline)
# Separador entre statements na saída SQL
output_encoding = utf-8

[post_write_hooks]
# Nenhum hook pós-escrita configurado por ora

# ─── Logging ─────────────────────────────────────────────────────────────────
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
